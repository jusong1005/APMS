server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: agri-price-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://127.0.0.1:27017/agri_price}
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 2s
      repositories:
        enabled: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 8MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5174,http://localhost:5174,http://127.0.0.1:5180,http://localhost:5180}
  jwt:
    secret: ${APP_JWT_SECRET:AgriPriceMonitorJwtSecretForDevOnlyChangeMe2026}
    access-token-minutes: ${APP_JWT_ACCESS_MINUTES:120}
    refresh-token-days: ${APP_JWT_REFRESH_DAYS:7}
  auth:
    verification-code-minutes: ${APP_VERIFICATION_CODE_MINUTES:5}
    expose-verification-code: ${APP_EXPOSE_VERIFICATION_CODE:true}
  redis:
    key-prefix: ${AGRI_REDIS_KEY_PREFIX:agri:realtime}
  files:
    upload-dir: ${AGRI_UPLOAD_DIR:./uploads}
  collector:
    python-bin: ${AGRI_PYTHON_BIN:/home/ubuntu/agri/.venv/bin/python}
    realtime-script: ${AGRI_REALTIME_COLLECTOR:/home/ubuntu/agri/code/PM/data/scripts/realtime_collector.py}
    import-script: ${AGRI_IMPORT_HISTORY_SCRIPT:/home/ubuntu/agri/code/PM/data/scripts/import_history_to_mongodb.py}
    output-dir: ${AGRI_COLLECTOR_OUTPUT_DIR:/home/ubuntu/agri/code/PM/backend/target/collector-runs}
    timeout-seconds: ${AGRI_COLLECTOR_TIMEOUT_SECONDS:180}

logging:
  level:
    org.springframework.security: INFO
    com.agri.backend: INFO